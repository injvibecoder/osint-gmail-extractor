<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSINT Gmail Extractor</title>
  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:        #0a0c0f;
      --bg2:       #0f1217;
      --bg3:       #141820;
      --border:    #1e2530;
      --border2:   #252d3a;
      --green:     #00ff88;
      --green-dim: rgba(0,255,136,0.15);
      --green-mid: rgba(0,255,136,0.35);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.12);
      --red:       #ff4560;
      --yellow:    #ffd60a;
      --text:      #c8d6e5;
      --text-dim:  #5a7080;
      --font-mono: 'Courier New', 'Lucida Console', monospace;
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ──────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), var(--cyan), transparent);
      animation: scanBar 3s linear infinite;
    }
    @keyframes scanBar {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--green-dim);
      border: 1px solid var(--green);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      color: var(--green);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .status-badge {
      margin-left: auto;
      padding: 3px 9px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid;
      transition: all 0.3s;
    }
    .status-badge.idle {
      color: var(--text-dim);
      border-color: var(--border2);
      background: transparent;
    }
    .status-badge.running {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-dim);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    .status-badge.stopped {
      color: var(--red);
      border-color: var(--red);
      background: rgba(255,69,96,0.1);
    }

    /* ── Counter bar ───────────────────────────────────────── */
    .counter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .counter-label { color: var(--text-dim); font-size: 10px; }
    .counter-value {
      font-size: 22px;
      font-weight: bold;
      color: var(--green);
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }
    .counter-value.new {
      color: var(--cyan);
      animation: bump 0.4s ease-out;
    }
    @keyframes bump {
      0%   { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .counter-meta {
      text-align: right;
      color: var(--text-dim);
      font-size: 10px;
    }
    .counter-meta span { color: var(--cyan); }

    /* ── Controls ──────────────────────────────────────────── */
    .controls {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .btn {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 0.08; }
    .btn:active { transform: scale(0.97); }

    .btn-start {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-dim);
    }
    .btn-stop {
      color: var(--red);
      border-color: var(--red);
      background: rgba(255,69,96,0.08);
    }
    .btn-stop:disabled, .btn-start:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Options ───────────────────────────────────────────── */
    .options {
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      align-items: center;
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-wrap input[type="checkbox"] { display: none; }
    .toggle {
      width: 30px;
      height: 16px;
      background: var(--border2);
      border-radius: 8px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: var(--text-dim);
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: all 0.2s;
    }
    .toggle-wrap input:checked + .toggle {
      background: var(--green-mid);
    }
    .toggle-wrap input:checked + .toggle::after {
      left: 16px;
      background: var(--green);
    }
    .toggle-label { font-size: 10px; color: var(--text-dim); }

    /* ── Email list ────────────────────────────────────────── */
    .list-header {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .list-title {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-clear {
      font-size: 9px;
      color: var(--red);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover { opacity: 1; }

    /* Dedup button */
    .btn-dedup {
      font-size: 9px;
      color: var(--cyan);
      background: none;
      border: 1px solid rgba(0,212,255,0.3);
      cursor: pointer;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .btn-dedup:hover {
      border-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .btn-dedup.flash {
      animation: dedupFlash 0.6s ease-out;
    }
    @keyframes dedupFlash {
      0%   { background: rgba(0,212,255,0.4); color: #fff; }
      100% { background: transparent; }
    }

    .email-list-wrap {
      height: 180px;
      overflow-y: auto;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .email-list-wrap::-webkit-scrollbar { width: 4px; }
    .email-list-wrap::-webkit-scrollbar-track { background: var(--bg); }
    .email-list-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .email-list-wrap::-webkit-scrollbar-thumb:hover { background: var(--green-mid); }

    .email-list {
      list-style: none;
      padding: 0;
    }

    .email-item {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s ease-out;
      transition: background 0.15s;
      gap: 8px;
    }
    .email-item:hover { background: var(--bg2); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .email-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--green);
    }
    .email-text {
      flex: 1;
      color: var(--cyan);
      font-size: 11px;
      word-break: break-all;
    }
    .email-copy-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-size: 9px;
      padding: 2px 6px;
      cursor: pointer;
      font-family: var(--font-mono);
      border-radius: 2px;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .email-copy-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }
    .email-copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 24px; opacity: 0.4; }
    .empty-text { font-size: 10px; text-align: center; line-height: 1.6; }

    /* ── Export buttons ────────────────────────────────────── */
    .export-bar {
      padding: 10px 16px;
      display: flex;
      gap: 6px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .btn-export {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.2s;
    }
    .btn-export:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: var(--cyan-dim);
    }
    .btn-copy-all {
      border-color: var(--yellow);
      color: var(--yellow);
      background: rgba(255,214,10,0.06);
    }
    .btn-copy-all:hover {
      background: rgba(255,214,10,0.12);
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      padding: 8px 16px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-note {
      font-size: 9px;
      color: var(--text-dim);
    }
    .footer-note strong { color: var(--green); }

    /* ── Toast ─────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      white-space: nowrap;
      z-index: 1000;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Not on DDG warning ─────────────────────────────────── */
    .warning-bar {
      display: none;
      padding: 8px 16px;
      background: rgba(255,69,96,0.1);
      border: 1px solid rgba(255,69,96,0.3);
      margin: 8px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--red);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">🔍</div>
      <div>
        <div class="title">OSINT Extractor</div>
        <div class="subtitle">Gmail Hunter · DuckDuckGo SERP</div>
      </div>
      <span class="status-badge idle" id="statusBadge">Idle</span>
    </div>
  </div>

  <!-- Warning (shown if not on DDG) -->
  <div class="warning-bar" id="warningBar">
    ⚠ Navigate to <strong>duckduckgo.com</strong> to use this extension
  </div>

  <!-- Counter -->
  <div class="counter-bar">
    <div>
      <div class="counter-label">Emails Found</div>
      <div class="counter-value" id="counterValue">0</div>
    </div>
    <div class="counter-meta">
      <div>Session</div>
      <div><span id="sessionTime">00:00</span></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-start" id="btnStart">▶ Start Extracting</button>
    <button class="btn btn-stop" id="btnStop" disabled>■ Stop</button>
  </div>

  <!-- Options -->
  <div class="options">
    <label class="toggle-wrap">
      <input type="checkbox" id="toggleHighlight" checked />
      <span class="toggle"></span>
      <span class="toggle-label">Highlight emails</span>
    </label>
    <label class="toggle-wrap">
      <input type="checkbox" id="toggleAllEmails" />
      <span class="toggle"></span>
      <span class="toggle-label">All providers</span>
    </label>
  </div>

  <!-- Email list header -->
  <div class="list-header">
    <span class="list-title">⚡ Live Results</span>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn-dedup" id="btnDedup" title="Remove any duplicate emails from the list">⊘ Dedup</button>
      <button class="btn-clear" id="btnClear">✕ Clear</button>
    </div>
  </div>

  <!-- Email list -->
  <div class="email-list-wrap">
    <ul class="email-list" id="emailList">
      <li class="email-item" style="display:block;padding:0;">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📭</div>
          <div class="empty-text">
            No emails found yet.<br/>
            Start extracting on a DuckDuckGo<br/>search results page.
          </div>
        </div>
      </li>
    </ul>
  </div>

  <!-- Export bar -->
  <div class="export-bar">
    <button class="btn-export btn-copy-all" id="btnCopyAll">⎘ Copy All</button>
    <button class="btn-export" id="btnDownloadTXT">↓ TXT</button>
    <button class="btn-export" id="btnDownloadJSON">↓ JSON</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-note">Only scans <strong>visible SERP text</strong> — no external requests</span>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
